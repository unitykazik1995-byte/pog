name: oko_saurona
description: The most advanced private mobile AI vision platform.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.3
  camera: ^0.10.5
  flutter_map: ^6.1.0
  sqflite_sqlcipher: ^3.0.2
  path_provider: ^2.1.1
  permission_handler: ^11.0.1
  ffi: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/icons/
